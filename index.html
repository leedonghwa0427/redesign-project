<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>리디자인 프로젝트</title>

    <!-- desktop 1280px -->
    <!-- tablet 768 ~ 1023px -->
    <!-- mobile 480 ~ 767px -->

    <!-- Abhaya+Libre 폰트 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/fonts.css" />
    <script src="js/script.js" defer></script>
  </head>

  <body>
    <div class="wrap">
      <!-- header section -->
      <header class="header">
        <div class="inner">
          <div class="logo">
            <a href="index.html">
              <img src="assets/images/logo khis.svg" alt="로고" />
            </a>
            <li><a href="#khis">한국정보의료원</a></li>
          </div>

          <nav class="nav">
            <ul class="menu-list">
              <li><a href="#business">사업소개</a></li>
              <li><a href="#information">정보자료실</a></li>
              <li><a href="#news">뉴스/소식</a></li>
              <li><a href="#contact">국민참여</a></li>
            </ul>
          </nav>
          <div class="lang">
            <img src="assets/icons/earth.svg" alt="earth" />
            <a href="#">ENG</a>
          </div>
        </div>
      </header>

      <section class="video">
        <img src="assets/video/background.gif" alt="메인 배경" />
      </section>

      <!-- main section -->
      <main class="main">
        <!-- hero section -->
        <section id="주요사업" class="hero-section">
          <div class="section-title">
            <h2 class="title">Key Bus<span class="red">i</span>ness Areas</h2>
            <p class="sub-title">주요 사업</p>
          </div>
          <div class="card-wrap">
            <div class="card">
              <img src="assets/images/01.png" alt="카드1" />
            </div>
            <div class="card">
              <img src="assets/images/02.png" alt="카드2" />
            </div>
            <div class="card">
              <img src="assets/images/03.png" alt="카드3" />
            </div>
            <div class="card">
              <img src="assets/images/04.png" alt="카드4" />
            </div>
          </div>
          <div class="card-title">
            <h2 class="card1">01</h2>
            <h2 class="card2">02</h2>
            <h2 class="card3">03</h2>
            <h2 class="card4">04</h2>
          </div>
          <div class="card-subtitle">
            <p class="card1">전자의무 기록 시스템</p>
            <p class="card2">국가 보건의료정보 표준화</p>
            <p class="card3">보건의료정보 활용기반 구축</p>
            <p class="card4">주무관청, 국가기관 위탁/지원</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
